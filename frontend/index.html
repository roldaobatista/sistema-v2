<!doctype html>
<html lang="pt-BR">

<head>

  <script>
    // Tema: uma única classe no html (evita mistura claro+escuro). Fonte: ui-store; default 'light'.
    // Decisão documentada (RELATORIO_ANALISE_CODIGO Fase 3): catch vazio intencional — localStorage
    // pode falhar em modo privado/iframe; falhar silenciosamente evita FOUC e quebra da página.
    try {
      var raw = localStorage.getItem('ui-store');
      var theme = 'light';
      if (raw) {
        try {
          var o = JSON.parse(raw);
          theme = (o && o.theme) || 'light';
        } catch (e) { /* ignore parse */ }
      }
      var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      var root = document.documentElement;
      root.classList.remove('dark', 'light');
      root.classList.add(isDark ? 'dark' : 'light');
    } catch (e) { /* ignore localStorage unavailable (e.g. private mode) */ }
  </script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
