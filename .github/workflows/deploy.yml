name: Deploy to Production

on:
    workflow_run:
        workflows: ["CI", "Security Scans", "Nightly Regression"]
        types: [completed]
        branches: [main]
    workflow_dispatch:
        inputs:
            confirm:
                description: "Confirmar deploy em produção (digite 'deploy')"
                required: true
                default: ""

# Ensure only one deploy runs at a time
concurrency:
    group: production-deploy
    cancel-in-progress: false

permissions:
    contents: read
    actions: read

jobs:
    validate-deploy-gates:
        name: Validate Deploy Gates
        runs-on: ubuntu-latest
        if: >
            (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy') ||
            (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        outputs:
            target-sha: ${{ steps.required-workflows.outputs.target-sha }}
        steps:
            - name: Require green workflows on main
              id: required-workflows
              uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
              with:
                  script: |
                      const requiredWorkflows = ['CI', 'Security Scans', 'Nightly Regression'];
                      const targetBranch = 'main';
                      const targetSha = context.eventName === 'workflow_run'
                        ? context.payload.workflow_run.head_sha
                        : context.sha;

                      core.setOutput('target-sha', targetSha);

                      if (context.ref !== `refs/heads/${targetBranch}`) {
                        core.setFailed(`Production deploys must run from ${targetBranch}; received ${context.ref}.`);
                        return;
                      }

                      const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        per_page: 100,
                      });

                      const failures = [];

                      for (const workflowName of requiredWorkflows) {
                        const workflow = workflows.find((item) => item.name === workflowName);

                        if (!workflow) {
                          failures.push(`${workflowName}: workflow is missing`);
                          continue;
                        }

                        const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          workflow_id: workflow.id,
                          branch: targetBranch,
                          status: 'completed',
                          per_page: 100,
                        });

                        const matchingRun = runs.find((run) => run.head_sha === targetSha);

                        if (!matchingRun) {
                          failures.push(`${workflowName}: no completed run found for ${targetSha}`);
                          continue;
                        }

                        if (matchingRun.conclusion !== 'success') {
                          failures.push(`${workflowName}: ${matchingRun.conclusion} for ${targetSha}`);
                        }
                      }

                      if (failures.length > 0) {
                        core.setFailed(`Deploy gate blocked:\n${failures.map((failure) => `- ${failure}`).join('\n')}`);
                        return;
                      }

                      core.info(`Deploy gate passed for ${targetSha}: ${requiredWorkflows.join(', ')}`);

    deploy:
        name: Deploy (Zero-Downtime)
        runs-on: ubuntu-latest
        needs: validate-deploy-gates
        if: needs.validate-deploy-gates.result == 'success'
        environment: production

        steps:
            - name: Prepare SSH Key
              env:
                  SSH_KEY: ${{ secrets.SSH_KEY }}
              run: |
                  set -euo pipefail
                  install -m 700 -d ~/.ssh
                  printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
                  chmod 600 ~/.ssh/deploy_key

            - name: Deploy via SSH
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
              run: |
                  set -euo pipefail

                  DEPLOY_USER="${DEPLOY_USER:-root}"
                  DEPLOY_PORT="${DEPLOY_PORT:-22}"

                  ssh -i ~/.ssh/deploy_key \
                    -o ServerAliveInterval=15 \
                    -o ServerAliveCountMax=20 \
                    -o StrictHostKeyChecking=no \
                    -p "$DEPLOY_PORT" \
                    "${DEPLOY_USER}@${DEPLOY_HOST}" \
                    'cd /root/sistema && bash deploy/deploy.sh'

            - name: Health Check
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
              run: |
                  set -euo pipefail

                  DEPLOY_USER="${DEPLOY_USER:-root}"
                  DEPLOY_PORT="${DEPLOY_PORT:-22}"

                  ssh -i ~/.ssh/deploy_key \
                    -o ServerAliveInterval=15 \
                    -o ServerAliveCountMax=20 \
                    -o StrictHostKeyChecking=no \
                    -p "$DEPLOY_PORT" \
                    "${DEPLOY_USER}@${DEPLOY_HOST}" \
                    'cd /root/sistema && bash deploy/deploy.sh --status'

            - name: Rollback Guidance
              if: failure()
              run: |
                  {
                    echo "## Rollback"
                    echo ""
                    echo "Automated rollback is intentionally not executed by this workflow because deploys without migrations must not restore an older database backup implicitly."
                    echo ""
                    echo "Manual rollback command:"
                    echo "\`\`\`bash"
                    echo "cd /root/sistema && bash deploy/deploy.sh --rollback"
                    echo "\`\`\`"
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Deploy Summary
              if: always()
              run: |
                  {
                    echo "## Deploy Summary"
                    echo ""
                    echo "| Item | Value |"
                    echo "|------|-------|"
                    echo "| Commit | \`${{ needs.validate-deploy-gates.outputs.target-sha }}\` |"
                    echo "| Branch | \`${{ github.ref_name }}\` |"
                    echo "| Triggered by | ${{ github.actor }} |"
                    echo "| Result | ${{ job.status }} |"
                  } >> "$GITHUB_STEP_SUMMARY"
