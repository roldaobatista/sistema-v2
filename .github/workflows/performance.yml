name: Performance Tests

on:
    pull_request:
        branches: [main]
    push:
        branches: [main, develop]
    schedule:
        - cron: "0 6 * * 0" # Domingo 02:00 BRT (06:00 UTC)
    workflow_dispatch:
        inputs:
            test_type:
                description: "Tipo de teste"
                required: true
                default: "load"
                type: choice
                options:
                    - load
                    - stress
                    - soak

permissions:
    contents: read

jobs:
    # ---------- Bundle Size Check ----------
    bundle-size:
        name: Bundle Size Check
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            MAX_BUNDLE_SIZE_KB: "2500"
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              working-directory: frontend
              run: npm ci

            - name: Build Frontend
              working-directory: frontend
              run: npm run build

            - name: Check Bundle Size
              working-directory: frontend
              run: |
                  # Calculate total gzipped size of JS+CSS assets
                  TOTAL_SIZE=0
                  for file in dist/assets/*.js dist/assets/*.css; do
                    if [ -f "$file" ]; then
                      GZIP_SIZE=$(gzip -c "$file" | wc -c)
                      FILE_NAME=$(basename "$file")
                      SIZE_KB=$((GZIP_SIZE / 1024))
                      echo "$FILE_NAME: ${SIZE_KB}KB gzipped"
                      TOTAL_SIZE=$((TOTAL_SIZE + GZIP_SIZE))
                    fi
                  done

                  TOTAL_KB=$((TOTAL_SIZE / 1024))
                  echo ""
                  echo "Total bundle size: ${TOTAL_KB}KB gzipped"
                  echo ""

                  # Ensure at least one asset file was found
                  if [ $TOTAL_SIZE -eq 0 ]; then
                    echo "::error::No JS/CSS assets found in dist/assets/ — build may be misconfigured"
                    exit 1
                  fi

                  # Total lazy-loaded JS+CSS budget for the built SPA.
                  MAX_SIZE=$((MAX_BUNDLE_SIZE_KB * 1024))
                  if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
                    echo "::error::Bundle size ${TOTAL_KB}KB exceeds ${MAX_BUNDLE_SIZE_KB}KB gzipped limit"
                    exit 1
                  else
                    echo "Bundle size ${TOTAL_KB}KB is within ${MAX_BUNDLE_SIZE_KB}KB limit"
                  fi

    # ---------- Lighthouse CI ----------
    lighthouse:
        name: Lighthouse CI
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              working-directory: frontend
              run: npm ci

            - name: Build Frontend
              working-directory: frontend
              run: npm run build

            - name: Install Lighthouse CI
              run: npm install -g @lhci/cli

            - name: Run Lighthouse CI
              working-directory: frontend
              run: lhci autorun --config=lighthouserc.json
              env:
                  LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

            - name: Upload Lighthouse Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: lighthouse-report
                  path: frontend/.lighthouseci/
                  retention-days: 14

    # ---------- k6 Load Tests ----------
    k6-tests:
        name: k6 ${{ github.event.inputs.test_type || 'load' }} test
        runs-on: ubuntu-latest
        timeout-minutes: 30
        # k6 requires a live API server (staging/prod) — cannot run in PR CI environment
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        steps:
            - uses: actions/checkout@v4

            - name: Install k6
              run: |
                  sudo gpg -k
                  sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
                  echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
                  sudo apt-get update
                  sudo apt-get install k6

            - name: Validate k6 Secrets
              run: |
                  MISSING=0
                  for VAR_NAME in BASE_URL TEST_EMAIL TEST_PASSWORD; do
                    if [ -z "${!VAR_NAME}" ]; then
                      echo "::error::$VAR_NAME is required for k6 performance tests"
                      MISSING=1
                    fi
                  done
                  exit $MISSING
              env:
                  BASE_URL: ${{ secrets.STAGING_API_URL }}
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

            - name: Run k6 Load Test
              if: github.event.inputs.test_type == 'load' || github.event_name == 'schedule'
              run: k6 run tests/performance/load-test.js --out json=results/k6-load-results.json
              env:
                  BASE_URL: ${{ secrets.STAGING_API_URL }}
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
                  COMPANY_ID: ${{ vars.TEST_COMPANY_ID || '1' }}

            - name: Run k6 Stress Test
              if: github.event.inputs.test_type == 'stress'
              run: k6 run tests/performance/stress-test.js --out json=results/k6-stress-results.json
              env:
                  BASE_URL: ${{ secrets.STAGING_API_URL }}
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
                  COMPANY_ID: ${{ vars.TEST_COMPANY_ID || '1' }}

            - name: Run k6 Soak Test
              if: github.event.inputs.test_type == 'soak'
              run: k6 run tests/performance/soak-test.js --out json=results/k6-soak-results.json
              env:
                  BASE_URL: ${{ secrets.STAGING_API_URL }}
                  TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
                  TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
                  COMPANY_ID: ${{ vars.TEST_COMPANY_ID || '1' }}

            - name: Upload Results
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: k6-results
                  path: results/
                  retention-days: 30
