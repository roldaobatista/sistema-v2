name: DAST Security Scan (OWASP ZAP)

on:
    schedule:
        - cron: "0 5 * * 0" # Domingo 02:00 BRT (05:00 UTC)
    workflow_dispatch:
        inputs:
            target_url:
                description: "URL de staging para scan"
                required: true
                default: ""

permissions:
    contents: read
    security-events: write
    issues: write

jobs:
    zap-baseline:
        name: ZAP Baseline Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: ZAP Baseline Scan
              uses: zaproxy/action-baseline@v0.14.0
              with:
                  target: ${{ github.event.inputs.target_url || vars.DAST_TARGET_URL || 'http://localhost' }}
                  rules_file_name: ".zap/rules.tsv"
                  cmd_options: >
                      -j
                      -a
                      -d
                      -T 60
                  allow_issue_writing: true

            - name: Upload ZAP Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: zap-report
                  path: report_html.html
                  retention-days: 30

    zap-api:
        name: ZAP API Scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: ZAP API Scan (OpenAPI/Scramble)
              uses: zaproxy/action-api-scan@v0.9.0
              with:
                  target: "${{ github.event.inputs.target_url || vars.DAST_TARGET_URL || 'http://localhost' }}/docs/api.json"
                  format: openapi
                  cmd_options: >
                      -j
                      -T 120
                  allow_issue_writing: true

            - name: Upload API Scan Report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: zap-api-report
                  path: report_html.html
                  retention-days: 30
