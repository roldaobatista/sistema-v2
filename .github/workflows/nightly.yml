name: Nightly Regression

on:
    schedule:
        - cron: "0 7 * * *" # 03:00 BRT (07:00 UTC)
    workflow_dispatch: # Manual trigger

permissions:
    contents: read

jobs:
    # ---------- Backend: Suite Completa (MySQL real) ----------
    backend-full:
        name: PHPUnit Full Suite (MySQL)
        runs-on: ubuntu-latest
        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: sistema_test
                ports: ["3306:3306"]
                options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

            redis:
                image: redis:7-alpine
                ports: ["6379:6379"]
                options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Setup PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
              with:
                  php-version: "8.4"
                  extensions: mbstring, xml, mysql, bcmath, redis, sqlite3, pdo_sqlite
                  coverage: xdebug

            - name: Install Dependencies
              working-directory: backend
              run: composer install --no-interaction --prefer-dist

            - name: Setup Environment
              working-directory: backend
              run: |
                  cp .env.example .env
                  php artisan key:generate
                  sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env
                  sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
                  sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
                  sed -i 's/DB_DATABASE=.*/DB_DATABASE=sistema_test/' .env
                  sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
                  sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env
                  sed -i 's/CACHE_STORE=.*/CACHE_STORE=redis/' .env
                  sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
                  sed -i 's/REDIS_PASSWORD=.*/REDIS_PASSWORD=null/' .env
                  sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env

            - name: Prepare Results Directory
              working-directory: backend
              run: mkdir -p results

            - name: Run Migrations
              working-directory: backend
              run: php artisan migrate --no-interaction --force

            - name: Run Full Test Suite
              working-directory: backend
              run: php -d memory_limit=2048M vendor/bin/phpunit --configuration phpunit.xml --log-junit results/phpunit-report.xml

            - name: Upload Test Results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              if: always()
              with:
                  name: phpunit-results
                  path: backend/results/
                  retention-days: 30

    # ---------- E2E: Suite Completa (21 specs) ----------
    e2e-full:
        name: Playwright Full Suite
        runs-on: ubuntu-latest
        env:
            CACHE_STORE: array
            QUEUE_CONNECTION: sync
            REDIS_HOST: 127.0.0.1
            REDIS_PASSWORD: "null"
            SESSION_DRIVER: array
            DB_CONNECTION: sqlite
            DB_DATABASE: ${{ github.workspace }}/backend/database/database.sqlite
            SEED_ADMIN_PASSWORD: CHANGE_ME_E2E_PASSWORD
            SEED_USER_PASSWORD: CHANGE_ME_E2E_RESTRICTED_PASSWORD
            E2E_PASSWORD: CHANGE_ME_E2E_PASSWORD
            E2E_RESTRICTED_PASSWORD: CHANGE_ME_E2E_RESTRICTED_PASSWORD
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  extensions: mbstring, xml, mysql, bcmath, sqlite3, pdo_sqlite
                  tools: composer:v2

            - name: Install Composer Dependencies
              working-directory: backend
              run: composer install --no-interaction --prefer-dist

            - name: Setup Backend Environment
              working-directory: backend
              run: |
                  cp .env.example .env
                  php artisan key:generate
                  sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env
                  sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
                  sed -i 's/CACHE_STORE=.*/CACHE_STORE=array/' .env
                  sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
                  sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
                  sed -i 's/REDIS_PASSWORD=.*/REDIS_PASSWORD=null/' .env
                  sed -i 's/SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
                  mkdir -p "$(dirname "$DB_DATABASE")"
                  rm -f "$DB_DATABASE"
                  touch "$DB_DATABASE"
                  sed -i "s|DB_DATABASE=.*|DB_DATABASE=$DB_DATABASE|" .env
                  php artisan optimize:clear
                  php artisan migrate --no-interaction --force

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              working-directory: frontend
              run: npm ci

            - name: Install Playwright Browsers
              working-directory: frontend
              run: npx playwright install --with-deps chromium

            - name: Prepare Result Directories
              working-directory: frontend
              run: mkdir -p results playwright-report

            - name: Run Full E2E Suite
              working-directory: frontend
              run: npx playwright test --reporter=html,json
              env:
                  PLAYWRIGHT_JSON_OUTPUT_NAME: results/playwright-report.json

            - name: Upload E2E Report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              if: always()
              with:
                  name: playwright-full-report
                  path: |
                      frontend/playwright-report/
                      frontend/results/
                  retention-days: 30

    # ---------- PHPStan Deep Scan ----------
    phpstan-deep:
        name: PHPStan Level 7 (Full)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Setup PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
              with:
                  php-version: "8.4"
                  extensions: mbstring, xml, mysql, bcmath
                  tools: composer:v2

            - name: Install Dependencies
              working-directory: backend
              run: composer install --no-interaction --prefer-dist

            - name: PHPStan Analysis
              working-directory: backend
              run: |
                  mkdir -p ../results
                  vendor/bin/phpstan analyse --memory-limit=2G --error-format=json > ../results/phpstan-report.json

            - name: Upload PHPStan Report
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              if: always()
              with:
                  name: phpstan-report
                  path: results/
                  retention-days: 30

    # ---------- Accessibility Full Scan (axe-core) ----------
    accessibility-full:
        name: Accessibility Full Scan (axe-core)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: frontend/package-lock.json

            - name: Install Dependencies
              working-directory: frontend
              run: npm ci

            - name: Build Frontend
              working-directory: frontend
              run: npm run build

            - name: Install axe-core CLI
              run: npm install -g @axe-core/cli

            - name: Serve and Run axe-core Full Scan
              working-directory: frontend
              run: |
                  set -o pipefail

                  npx serve -s dist -l 5173 &
                  SERVER_PID=$!

                  # Wait for server to be ready
                  for i in $(seq 1 30); do
                    if curl -s http://localhost:5173 > /dev/null 2>&1; then
                      echo "Server ready (attempt $i/30)"
                      break
                    fi
                    if [ "$i" -eq 30 ]; then
                      echo "Server failed to start on port 5173"
                      kill "$SERVER_PID" 2>/dev/null || true
                      exit 1
                    fi
                    sleep 1
                  done

                  axe http://localhost:5173 \
                    --tags wcag2a,wcag2aa,wcag21a,wcag21aa \
                    --save axe-full-results.json \
                    2>&1 | tee axe-full-output.txt

                  kill "$SERVER_PID" 2>/dev/null || true

            - name: Upload axe-core Full Results
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              if: always()
              with:
                  name: axe-core-full-report
                  path: |
                      frontend/axe-full-results.json
                      frontend/axe-full-output.txt
                  retention-days: 30

    # ---------- Relatório Consolidado ----------
    nightly-report:
        name: Nightly Summary
        needs: [backend-full, e2e-full, phpstan-deep, accessibility-full]
        runs-on: ubuntu-latest
        if: always()
        steps:
            - name: Summary
              run: |
                  {
                    echo "## 🌙 Nightly Regression Report"
                    echo ""
                    echo "| Job | Status |"
                    echo "|-----|--------|"
                    echo "| PHPUnit (MySQL) | ${{ needs.backend-full.result }} |"
                    echo "| Playwright (21 specs) | ${{ needs.e2e-full.result }} |"
                    echo "| PHPStan (Level 7) | ${{ needs.phpstan-deep.result }} |"
                    echo "| Accessibility (axe-core) | ${{ needs.accessibility-full.result }} |"
                  } >> "$GITHUB_STEP_SUMMARY"
