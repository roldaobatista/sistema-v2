name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------- Code Formatting (Laravel Pint) ----------
  code-formatting:
    name: Laravel Pint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, mysql, bcmath
          tools: composer:v2

      - name: Install Dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Laravel Pint (Code Style)
        working-directory: backend
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            DIFF_BASE="origin/$BASE_REF"
          else
            DIFF_BASE="$BEFORE_SHA"
          fi

          if [ -z "$DIFF_BASE" ] || [ "$DIFF_BASE" = "0000000000000000000000000000000000000000" ]; then
            DIFF_BASE="HEAD~1"
          fi

          vendor/bin/pint --test --diff="$DIFF_BASE" --no-interaction --no-ansi

  # ---------- Static Analysis (PHPStan + Larastan) ----------
  static-analysis:
    name: PHPStan (Level 7)
    needs: [code-formatting]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, mysql, bcmath
          tools: composer:v2

      - name: Install Dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        working-directory: backend
        run: vendor/bin/phpstan analyse --memory-limit=2G --no-progress

  # ---------- Frontend Lint ----------
  frontend-lint:
    name: ESLint + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npx eslint . --max-warnings=0

      - name: TypeScript Check
        working-directory: frontend
        run: npx tsc --noEmit

  # ---------- Backend Tests ----------
  backend-tests:
    needs: [static-analysis, code-formatting]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, mysql, bcmath, sqlite3, pdo_sqlite
          coverage: xdebug

      - name: Install Composer Dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Setup Environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/APP_DEBUG=.*/APP_DEBUG=true/' .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=:memory:|' .env
          sed -i 's/CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env

      - name: Run Migrations
        working-directory: backend
        run: php artisan migrate --no-interaction --force

      - name: Run Backend Tests
        working-directory: backend
        run: vendor/bin/pest --parallel --processes=16 --no-coverage

  frontend-build:
    needs: [frontend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ---------- Accessibility (axe-core) ----------
  accessibility:
    name: Accessibility (axe-core)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: [frontend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Install axe-core CLI
        run: npm install -g @axe-core/cli

      - name: Serve Frontend and Run axe-core
        working-directory: frontend
        run: |
          set -o pipefail

          npx serve -s dist -l 5173 &
          SERVER_PID=$!

          # Wait for server to be ready (retry loop instead of fixed sleep)
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Server ready (attempt $i/30)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "::error::Server failed to start on port 5173"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          # Run axe-core on key pages, fail on critical/serious
          axe http://localhost:5173 \
            --tags wcag2a,wcag2aa \
            --exit \
            --save axe-results.json \
            2>&1 | tee axe-output.txt

          EXIT_CODE=${PIPESTATUS[0]}
          kill $SERVER_PID 2>/dev/null || true

          # Fail pipeline if critical or serious violations found
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::axe-core found accessibility violations (critical/serious)"
            exit 1
          fi

      - name: Upload axe-core Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: axe-core-results
          path: |
            frontend/axe-results.json
            frontend/axe-output.txt
          retention-days: 14

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-build, backend-tests]
    env:
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      REDIS_HOST: 127.0.0.1
      SESSION_DRIVER: array
      SEED_ADMIN_PASSWORD: CHANGE_ME_E2E_PASSWORD
      SEED_USER_PASSWORD: CHANGE_ME_E2E_RESTRICTED_PASSWORD
      E2E_PASSWORD: CHANGE_ME_E2E_PASSWORD
      E2E_RESTRICTED_PASSWORD: CHANGE_ME_E2E_RESTRICTED_PASSWORD
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, mysql, bcmath, sqlite3, pdo_sqlite

      - name: Install Composer Dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Setup Backend Environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/APP_ENV=.*/APP_ENV=testing/' .env
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/CACHE_STORE=.*/CACHE_STORE=array/' .env
          sed -i 's/QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          sed -i 's/REDIS_HOST=.*/REDIS_HOST=127.0.0.1/' .env
          sed -i 's/SESSION_DRIVER=.*/SESSION_DRIVER=array/' .env
          touch database/database.sqlite
          sed -i "s|DB_DATABASE=.*|DB_DATABASE=$PWD/database/database.sqlite|" .env
          php artisan optimize:clear
          php artisan migrate --no-interaction --force

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            backend/storage/logs/
          retention-days: 14
