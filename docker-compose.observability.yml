# ============================================================
# KALIBRIUM ERP - Configuracao de Observabilidade
# Usar junto com docker-compose.prod*.yml ou docker-compose.yml
# ============================================================

services:
  backend:
    environment:
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-kalibrium-backend}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}

  queue:
    environment:
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: ${OTEL_QUEUE_SERVICE_NAME:-kalibrium-queue}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}

  scheduler:
    environment:
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: ${OTEL_SCHEDULER_SERVICE_NAME:-kalibrium-scheduler}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}

  reverb:
    environment:
      OTEL_SDK_DISABLED: "false"
      OTEL_SERVICE_NAME: ${OTEL_REVERB_SERVICE_NAME:-kalibrium-reverb}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}

  jaeger:
    image: jaegertracing/all-in-one:1.54
    container_name: kalibrium-jaeger
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:16686/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: kalibrium-otel
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      OTEL_DEPLOY_ENV: ${APP_ENV:-local}
      OTEL_DEPLOY_VERSION: ${SENTRY_RELEASE:-local-dev}
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4319:4317"
      - "127.0.0.1:4320:4318"
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:13133:13133"
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:13133/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    networks:
      - kalibrium

networks:
  kalibrium:
    name: kalibrium
    external: true
