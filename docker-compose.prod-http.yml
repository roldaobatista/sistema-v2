# Production via HTTP (IP only, no domain/SSL)
# Use for initial deployment: http://SEU_IP
services:
  nginx:
    image: nginx:1.27-alpine
    container_name: kalibrium_nginx
    restart: unless-stopped
    stop_grace_period: 15s
    ports:
      - "80:80"
    volumes:
      - ./nginx/default-http.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPENDENCIES: ${INSTALL_DEV_DEPENDENCIES:-false}
    container_name: kalibrium_backend
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kalibrium}
      DB_USERNAME: ${DB_USERNAME:-kalibrium}
      DB_PASSWORD: ${DB_PASSWORD:-kalibrium}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-local-dev}
      TELESCOPE_ENABLED: ${TELESCOPE_ENABLED:-false}
      BOOST_ENABLED: ${BOOST_ENABLED:-true}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-kalibrium-backend}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - backend_storage:/var/www/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPENDENCIES: ${INSTALL_DEV_DEPENDENCIES:-false}
    container_name: kalibrium_queue
    restart: unless-stopped
    stop_grace_period: 60s
    env_file: ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kalibrium}
      DB_USERNAME: ${DB_USERNAME:-kalibrium}
      DB_PASSWORD: ${DB_PASSWORD:-kalibrium}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-local-dev}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_QUEUE_SERVICE_NAME:-kalibrium-queue}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - backend_storage:/var/www/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'artisan horizon'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 1G

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPENDENCIES: ${INSTALL_DEV_DEPENDENCIES:-false}
    container_name: kalibrium_scheduler
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: ./backend/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kalibrium}
      DB_USERNAME: ${DB_USERNAME:-kalibrium}
      DB_PASSWORD: ${DB_PASSWORD:-kalibrium}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-local-dev}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SCHEDULER_SERVICE_NAME:-kalibrium-scheduler}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./backend/.env:/var/www/.env:ro
      - backend_storage:/var/www/storage/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "php artisan schedule:list > /dev/null 2>&1 || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_DEV_DEPENDENCIES: ${INSTALL_DEV_DEPENDENCIES:-false}
    container_name: kalibrium_reverb
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kalibrium}
      DB_USERNAME: ${DB_USERNAME:-kalibrium}
      DB_PASSWORD: ${DB_PASSWORD:-kalibrium}
      APP_ENV: ${APP_ENV:-production}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-}
      SENTRY_LARAVEL_DSN: ${SENTRY_LARAVEL_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-local}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-local-dev}
      BOOST_ENABLED: ${BOOST_ENABLED:-true}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_REVERB_SERVICE_NAME:-kalibrium-reverb}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-service.namespace=kalibrium,deployment.environment=local,service.version=local-dev}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${OTEL_PROPAGATORS:-tracecontext,baggage}
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_PHP_DISABLED_INSTRUMENTATIONS: ${OTEL_PHP_DISABLED_INSTRUMENTATIONS:-}
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    volumes:
      - ./backend/.env:/var/www/.env:ro
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "php -r '$$socket=@fsockopen(\"127.0.0.1\",8080,$$errorCode,$$errorMessage,2); if (!$$socket) { exit(1); } fclose($$socket);' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:-${APP_URL:-}}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_REVERB_APP_KEY: ${REVERB_APP_KEY:-}
        VITE_REVERB_HOST: ${VITE_REVERB_HOST:-}
        VITE_REVERB_PORT: ${VITE_REVERB_PORT:-}
        VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-}
        VITE_GO2RTC_URL: ${VITE_GO2RTC_URL:-}
        VITE_ERROR_REPORTING_URL: ${VITE_ERROR_REPORTING_URL:-}
        VITE_SENTRY_ENABLED: ${VITE_SENTRY_ENABLED:-true}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.2}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-${SENTRY_RELEASE:-}}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
        VITE_ENABLE_QUERY_DEVTOOLS: ${VITE_ENABLE_QUERY_DEVTOOLS:-false}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
        SENTRY_ORG: ${SENTRY_ORG:-}
        SENTRY_PROJECT: ${SENTRY_PROJECT:-}
        SENTRY_URL: ${SENTRY_URL:-https://sentry.io/}
    container_name: kalibrium_frontend
    restart: unless-stopped
    stop_grace_period: 10s
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # go2rtc: gateway RTSP → WebRTC. Configurável via .env: GO2RTC_API_ORIGIN (ex: http://SEU_IP ou https://app.empresa.com).
  go2rtc:
    image: alexxit/go2rtc:1.9.7
    container_name: kalibrium_go2rtc
    restart: unless-stopped
    stop_grace_period: 10s
    environment:
      GO2RTC_API_ORIGIN: "${GO2RTC_API_ORIGIN:-}"
    expose:
      - "1984"
      - "8555"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:1984/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  mysql:
    image: mysql:8.0.40
    container_name: kalibrium_mysql
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-kalibrium}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/docker/mysql/init:/docker-entrypoint-initdb.d
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  redis:
    image: redis:7.4-alpine
    container_name: kalibrium_redis
    restart: unless-stopped
    stop_grace_period: 10s
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kalibrium
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

volumes:
  mysql_data:
  redis_data:
  backend_storage:

networks:
  kalibrium:
    driver: bridge
